# XcodeGen project spec.
# Generates WoodlandsTrailGuide.xcodeproj from this YAML.
# Run `xcodegen generate` on any Mac (or in CI) to (re)create the project.
# Same pattern as the WoodlandsFishing app.

name: WoodlandsTrailGuide

options:
  bundleIdPrefix: com.compofelice
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_LANGUAGE: en
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ALWAYS_SEARCH_USER_PATHS: NO

targets:
  WoodlandsTrailGuide:
    type: application
    platform: iOS
    sources:
      - path: WoodlandsTrailGuide
        excludes:
          - "Info.plist"
    dependencies:
      - package: GoogleMobileAds
    info:
      path: WoodlandsTrailGuide/Info.plist
      properties:
        CFBundleDisplayName: WTG
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "8"
        CFBundleIconName: AppIcon
        UILaunchScreen:
          UIColorName: ""
        NSLocationWhenInUseUsageDescription: Used to show your position on the trails and find nearby trailheads.
        NSUserTrackingUsageDescription: Used to show relevant ads that help keep this app free and updated.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
        ITSAppUsesNonExemptEncryption: false
        # Google AdMob — app-level App ID for Woodlands Trail Guide.
        # Banner ad unit ID lives in MapTabView.swift.
        GADApplicationIdentifier: ca-app-pub-1927040492403163~2388146729
        # SKAdNetwork identifiers — Apple's privacy-preserving ad attribution.
        # List sourced from Google AdMob's recommended set, matched verbatim
        # to the WoodlandsFishing target.
